name: Run YTM Scrobbler
on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘全自動在背景跑一次
  workflow_dispatch: # 允許你隨時手動撳按鈕測試

jobs:
  scrobble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Standalone Scrobbler
        env:
          # 將你的密鑰先暫存進系統環境變數
          LASTFM_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SEC: ${{ secrets.LASTFM_SECRET }}
          YTM_COOK: ${{ secrets.YTM_COOKIE }}
        run: |
          # 1. 建立原作者程式指定需要的 cookie.txt
          echo "$YTM_COOK" > cookie.txt
          
          # 2. 同時建立原作者程式可能讀取的 .env 配置文件
          echo "LAST_FM_API=$LASTFM_KEY" > .env
          echo "LAST_FM_API_SECRET=$LASTFM_SEC" >> .env
          
          # 3. 執行主程式
          python start_standalone.py
