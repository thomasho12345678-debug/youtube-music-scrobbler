name: Run YTM Scrobbler
on:
  schedule:
    - cron: '*/5 * * * *' # 改為每 5 分鐘全自動在背景跑一次
  workflow_dispatch: # 允許你隨時手動測試

jobs:
  scrobble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests
          pip install -r requirements.txt

      - name: Run Standalone Scrobbler
        env:
          LASTFM_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SEC: ${{ secrets.LASTFM_SECRET }}
          YTM_COOK: ${{ secrets.YTM_COOKIE }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          # 1. 同時建立原作者程式需要讀取的環境變數配置文件
          echo "LAST_FM_API=$LASTFM_KEY" > .env
          echo "LAST_FM_API_SECRET=$LASTFM_SEC" >> .env
          
          # 2. 【核心修正】用 echo 強行把 Cookie 管道傳輸給 Python 的 input()
          # 這樣程式一問「請輸入 Cookie」，雲端系統就會一秒幫牠自動貼上並按 Enter
          echo "$YTM_COOK" | python start_standalone.py

